name: Student Dashboard CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      # -----------------------
      # 1. Checkout Code
      # -----------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------
      # 2. Setup Python
      # -----------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Python Version
        run: python --version

      # -----------------------
      # 3. Install Dependencies
      # -----------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # -----------------------
      # 4. Clean Old Coverage
      # -----------------------
      - name: Clean old coverage
        run: |
          rm -f .coverage
          rm -rf htmlcov

      # -----------------------
      # 5. Run Tests (Stage-wise)
      # -----------------------

      - name: Run Auth Tests
        run: pytest -v tests/test_auth.py --cov=app --cov-append

      - name: Run API Tests
        run: pytest -v tests/test_api.py --cov=app --cov-append

      - name: Run Search Tests
        run: pytest -v tests/test_search.py --cov=app --cov-append

      - name: Run Performance Tests
        run: pytest -v tests/test_performance.py --cov=app --cov-append

      # -----------------------
      # 6. Generate Final Coverage
      # -----------------------
      - name: Generate Coverage Report
        run: |
          coverage report -m
          coverage html

      # -----------------------
      # 7. Upload HTML Coverage
      # -----------------------
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: htmlcov/